<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TTS-Test</title>
<style>
  body { font-family: -apple-system, sans-serif; max-width: 600px; margin: 0 auto; padding: 24px; background:#f7f3ec; color:#2a2420; }
  h1 { font-size: 20px; }
  button { display:block; width:100%; padding:18px; margin:10px 0; font-size:18px; border:none; border-radius:12px; background:#3a5a4a; color:#fff; }
  button:active { background:#2a4235; }
  #log { margin-top:20px; padding:14px; background:#fffdf8; border-radius:10px; font-size:13px; white-space:pre-wrap; line-height:1.6; min-height:120px; border:1px solid #e0d8c8; }
  .hint { font-size:13px; color:#6a6255; margin-top:8px; }
</style>
</head>
<body>
<h1>Sprachausgabe-Test</h1>
<p class="hint">Jeder Knopf probiert eine andere Methode. Drücke sie der Reihe nach und schau, ob (und bei welchem) Ton kommt.</p>

<button id="b1">1 · Einfachster Test ("hola", spanisch)</button>
<button id="b2">2 · Ohne Sprachangabe ("test")</button>
<button id="b3">3 · Deutsch ("hallo")</button>
<button id="b4">4 · Mit expliziter Stimme (erste spanische)</button>
<button id="b5">Stimmen auf diesem Gerät auflisten</button>
<button id="b6" style="background:#7a4a2a">6 · MP3-METHODE (wie Quizlet!) — "hola" spanisch</button>
<button id="b7" style="background:#2a4a7a">7 · DEIN WORKER (/tts) — "hola" spanisch</button>
<button id="b8" style="background:#1a5a3a">8 · EXAKT WIE SPRICH — "hola" mit gesetzter Stimme</button>

<div id="log">Bereit. Warte auf Eingabe…</div>

<script>
const log = (m) => { document.getElementById('log').textContent = m + '\n\n' + document.getElementById('log').textContent; };

function basicSpeak(text, lang, useVoice) {
  if (!('speechSynthesis' in window)) { log('❌ speechSynthesis existiert nicht in diesem Browser'); return; }
  try {
    const u = new SpeechSynthesisUtterance(text);
    if (lang) u.lang = lang;
    u.volume = 1; u.rate = 1; u.pitch = 1;
    if (useVoice) {
      const voices = window.speechSynthesis.getVoices();
      const v = voices.find(x => x.lang && x.lang.toLowerCase().startsWith('es'));
      if (v) { u.voice = v; log('Verwende Stimme: ' + v.name + ' (' + v.lang + ')'); }
      else log('Keine spanische Stimme gefunden, nutze Standard');
    }
    u.onstart = () => log('🔊 onstart — Ausgabe hat begonnen: "' + text + '"');
    u.onend   = () => log('✅ onend — Ausgabe beendet: "' + text + '"');
    u.onerror = (e) => log('❌ onerror: ' + (e && e.error ? e.error : 'unbekannt'));
    window.speechSynthesis.speak(u);
    log('→ speak() aufgerufen für "' + text + '" (lang=' + (lang||'—') + ')');
  } catch(e) { log('❌ Exception: ' + e.message); }
}

document.getElementById('b1').onclick = () => basicSpeak('hola', 'es-ES', false);
document.getElementById('b2').onclick = () => basicSpeak('test', '', false);
document.getElementById('b3').onclick = () => basicSpeak('hallo', 'de-DE', false);
document.getElementById('b4').onclick = () => basicSpeak('hola', 'es-ES', true);
document.getElementById('b5').onclick = () => {
  const voices = window.speechSynthesis.getVoices();
  if (!voices.length) { log('⚠️ getVoices() liefert 0 Stimmen (evtl. noch nicht geladen — nochmal drücken)'); return; }
  const list = voices.map(v => v.lang + ' · ' + v.name).join('\n');
  log('Gefundene Stimmen (' + voices.length + '):\n' + list);
};

document.getElementById('b6').onclick = () => {
  const text = 'hola', lang = 'es';
  // Google-Translate-TTS liefert eine echte MP3. Direktaufruf scheitert an CORS,
  // daher über einen öffentlichen CORS-Proxy (nur zum Testen!).
  const googleUrl = 'https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&q=' + encodeURIComponent(text) + '&tl=' + lang;
  const proxied = 'https://corsproxy.io/?url=' + encodeURIComponent(googleUrl);
  log('→ Lade MP3 über Proxy…');
  try {
    const audio = new Audio(proxied);
    audio.onplay = () => log('🔊 MP3 spielt ab!');
    audio.onerror = (e) => log('❌ MP3-Fehler: ' + (audio.error ? audio.error.code + ' / ' + audio.error.message : 'unbekannt'));
    audio.onended = () => log('✅ MP3 fertig abgespielt');
    audio.play().then(() => log('→ play() akzeptiert')).catch(err => log('❌ play() abgelehnt: ' + err.message));
  } catch(e) { log('❌ Exception: ' + e.message); }
};

document.getElementById('b8').onclick = () => {
  // Repliziert exakt die sprich.-Logik: Stimme explizit auswählen + zuweisen
  const speakCode = 'es-ES';
  if (!('speechSynthesis' in window)) { log('❌ speechSynthesis fehlt'); return; }
  const vs = speechSynthesis.getVoices();
  const pref = speakCode.toLowerCase();
  const base = pref.split('-')[0];
  const exact = vs.filter(v => v.lang.toLowerCase() === pref);
  const loose = vs.filter(v => v.lang.toLowerCase().startsWith(base));
  const pool = exact.length ? exact : loose;
  const GOOD = /(enhanced|premium|neural|siri|natural|hd)/i;
  const BAD  = /(compact|eloquence)/i;
  const v = pool.find(x => GOOD.test(x.name)) || pool.find(x => !BAD.test(x.name)) || pool[0] || null;
  try {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance('hola');
    u.lang = speakCode;
    if (v) { u.voice = v; u.lang = v.lang || speakCode; log('Stimme gesetzt: ' + v.name + ' (' + v.lang + ')'); }
    else log('⚠️ Keine passende Stimme im Pool gefunden');
    u.rate = 0.95; u.pitch = 1.0;
    u.onstart = () => log('🔊 onstart — spielt!');
    u.onend = () => log('✅ onend');
    u.onerror = (e) => log('❌ onerror: ' + (e && e.error));
    speechSynthesis.speak(u);
    log('→ speak() aufgerufen (exakt wie sprich.)');
  } catch(e) { log('❌ Exception: ' + e.message); }
};

document.getElementById('b7').onclick = async () => {
  const text = 'hola', lang = 'es';
  const workerUrl = 'https://spring-water-f9f9.philipp-zart.workers.dev/tts';
  log('→ Frage deinen Worker an (/tts)…');
  try {
    const r = await fetch(workerUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, lang, voice: '' })
    });
    log('→ Antwort: HTTP ' + r.status + ' (' + (r.headers.get('content-type')||'?') + ')');
    if (!r.ok) { const t = await r.text(); log('❌ Worker-Fehler: ' + t.slice(0,200)); return; }
    const blob = await r.blob();
    log('→ Audio erhalten: ' + blob.size + ' Bytes, Typ ' + blob.type);
    if (!blob.size) { log('❌ Leeres Audio zurückbekommen'); return; }
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    audio.onplay = () => log('🔊 Worker-Audio spielt ab!');
    audio.onerror = () => log('❌ Audio-Fehler ' + (audio.error?audio.error.code:'?'));
    audio.onended = () => log('✅ fertig');
    await audio.play();
    log('→ play() akzeptiert');
  } catch(e) { log('❌ Fehler: ' + e.message); }
};

if ('speechSynthesis' in window) {
  window.speechSynthesis.onvoiceschanged = () => log('ℹ️ Stimmen wurden geladen (' + window.speechSynthesis.getVoices().length + ' Stück)');
  log('speechSynthesis ist verfügbar. Stimmen aktuell: ' + window.speechSynthesis.getVoices().length);
} else {
  log('❌ speechSynthesis NICHT verfügbar in diesem Browser');
}
</script>
</body>
</html>
